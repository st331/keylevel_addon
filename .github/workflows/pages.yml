name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Warcraft Logs client secret (from Actions secrets)
        env:
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: |
          if [ -z "$WCL_CLIENT_SECRET" ]; then
            echo "::warning::WCL_CLIENT_SECRET repository secret is not set — deploying without embedded credentials; visitors will be asked to connect their own Warcraft Logs account."
          else
            python3 -c 'import os, pathlib; p = pathlib.Path("docs/js/config.js"); p.write_text(p.read_text().replace("__WCL_CLIENT_SECRET__", os.environ["WCL_CLIENT_SECRET"]))'
            echo "embedded credentials injected"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
